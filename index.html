<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Volunteer OS | พอร์ทัลระบบอาสาสมัครส่วนกลาง</title>
  
  <!-- Apple Sleek Interface Frameworks -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Sarabun', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #F5F5F7;
      color: #1D1D1F;
      font-family: 'Inter', 'Sarabun', sans-serif;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Configured Apps Script API endpoint
    const API_URL = "https://script.google.com/macros/s/AKfycby6FkuiT16PiyfSmzZgNviSkNln4CUaNqI_sNMm3fi5ZtcMUtP6iupUZ48lSifrbC2g/exec";

    function App() {
      const [user, setUser] = useState({
        UserID: "somchai@volunteer.org",
        Name: "สมชาย",
        Surname: "ดีเลิศ",
        Role: "Staff",
        Level: "Leader",
        Department: "สมาธิและปัญญา",
        BoonScore: 850,
        Avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Felix"
      });

      const [currentTab, setCurrentTab] = useState("home");
      const [goodnessForm, setGoodnessForm] = useState({
        Giving: { done: false, text: "", photo: "" },
        Sila: { done: false, text: "", photo: "" },
        Clean: { done: false, text: "", photo: "" },
        Array: { done: false, text: "", photo: "" },
        Polite: { done: false, text: "", photo: "" },
        Ontime: { done: false, text: "", photo: "" },
        Meditate: { done: false, text: "", photo: "" }
      });

      const [activities, setActivities] = useState([
        { AcID: "AC-001", Title: "นั่งสมาธิเย็นวันศุกร์ (Friday Meditation)", BoonScore: 50, Location: "อาคารปฏิบัติธรรม ชั้น 4", Time: "18:00 น.", Image: "https://images.unsplash.com/photo-1544367567-0f2fcb009e0b?auto=format&fit=crop&q=80&w=600" },
        { AcID: "AC-002", Title: "ทำบุญตักบาตรเช้าวันอาทิตย์ (Sunday Alms)", BoonScore: 60, Location: "ลานธรรมสากล", Time: "06:30 น.", Image: "https://images.unsplash.com/photo-1609137144814-1e967885b59b?auto=format&fit=crop&q=80&w=600" }
      ]);

      const [syncing, setSyncing] = useState(false);
      const [message, setMessage] = useState("");

      const calculatedScore = useMemo(() => {
        const doneCount = Object.values(goodnessForm).filter(v => v.done).length;
        return user.BoonScore + (doneCount * 10);
      }, [user, goodnessForm]);

      const completedCount = useMemo(() => {
        return Object.values(goodnessForm).filter(v => v.done).length;
      }, [goodnessForm]);

      useEffect(() => {
        lucide.createIcons();
      }, [currentTab]);

      const handleSaveGoodness = async () => {
        if (!API_URL || API_URL.includes("PLEASE_PASTE")) {
          alert("กรุณาติดตั้ง Apps Script WebApp URL ก่อนใช้งานในระบบคลาวด์ จริง");
          return;
        }
        setSyncing(true);
        try {
          const response = await fetch(API_URL, {
            method: "POST",
            mode: "no-cors", // avoid CORS complexity in static deploys
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "saveGoodness",
              gData: {
                UserID: user.UserID,
                DoDate: new Date().toISOString(),
                GivingPoint: goodnessForm.Giving.done ? 1 : 0,
                SilaPoint: goodnessForm.Sila.done ? 1 : 0,
                CleanPoint: goodnessForm.Clean.done ? 1 : 0,
                ArrayPoint: goodnessForm.Array.done ? 1 : 0,
                PolitePoint: goodnessForm.Polite.done ? 1 : 0,
                OntimePoint: goodnessForm.Ontime.done ? 1 : 0,
                MeditatePoint: goodnessForm.Meditate.done ? 1 : 0
              }
            })
          });
          setMessage("ส่งประวัติความดีไปยัง Google Sheets เรียบร้อยแล้ว!");
          setTimeout(() => setMessage(""), 4000);
        } catch (e) {
          alert("ไม่สามารถบันทึกไปยัง Apps Script ได้: " + e.message);
        } finally {
          setSyncing(false);
        }
      };

      return (
        <div className="flex flex-col h-screen w-full bg-[#F5F5F7] text-[#1D1D1F] overflow-hidden">
          {/* Top Header Navigation */}
          <header className="h-12 bg-white/80 backdrop-blur-md border-b border-[#D2D2D7] flex items-center justify-between px-6 shrink-0 z-50">
            <div className="flex items-center gap-3">
              <div className="w-7 h-7 bg-[#0071E3] rounded-lg flex items-center justify-center shadow-sm">
                <i data-lucide="globe" className="w-4 h-4 text-white"></i>
              </div>
              <span className="font-semibold text-[17px] tracking-tight">Volunteer OS Portal</span>
            </div>
            <nav className="flex items-center gap-8">
              <button onClick={() => setCurrentTab("home")} className={`text-[12px] font-medium ${currentTab === 'home' ? 'opacity-100 font-bold text-[#0071E3]' : 'opacity-60'}`}>หน้าแรก</button>
              <button onClick={() => setCurrentTab("activities")} className={`text-[12px] font-medium ${currentTab === 'activities' ? 'opacity-100 font-bold text-[#0071E3]' : 'opacity-60'}`}>กิจกรรม</button>
              <div className="flex items-center gap-2 border-l border-[#D2D2D7] pl-8">
                <div className="text-right">
                  <p className="text-[11px] font-bold leading-tight">{user.Name} {user.Surname}</p>
                  <p className="text-[10px] text-[#86868B]">{user.Department}</p>
                </div>
                <img src={user.Avatar} alt="Avatar" className="w-8 h-8 rounded-full border border-[#D2D2D7]" />
              </div>
            </nav>
          </header>

          {/* Main Content Areas */}
          <main className="flex-1 p-8 grid grid-cols-12 gap-6 overflow-y-auto">
            
            {/* Sidebar / Profile stats */}
            <aside className="col-span-3 flex flex-col gap-6">
              <div className="bg-white rounded-2xl p-6 border border-[#D2D2D7] shadow-sm flex flex-col items-center">
                <h2 className="text-[11px] font-bold mb-4 uppercase tracking-wider text-[#86868B] self-start">สรุปแต้มบุญสะสม</h2>
                
                <div className="relative flex items-center justify-center py-4 w-full">
                  <svg className="w-32 h-32 transform -rotate-90">
                    <circle cx="64" cy="64" r="58" stroke="#F5F5F7" strokeWidth="10" fill="transparent" />
                    <circle 
                      cx="64" 
                      cy="64" 
                      r="58" 
                      stroke="#AF52DE" 
                      strokeWidth="10" 
                      fill="transparent" 
                      strokeDasharray="364.4" 
                      strokeDashoffset={364.4 - (364.4 * Math.min(calculatedScore, 1000) / 1000)}
                      className="transition-all duration-500"
                    />
                  </svg>
                  <div className="absolute flex flex-col items-center">
                    <span className="text-2xl font-bold tracking-tight">{calculatedScore}</span>
                    <span className="text-[9px] uppercase font-semibold text-[#86868B]">แต้มทั้งหมด</span>
                  </div>
                </div>

                <div className="mt-4 grid grid-cols-2 gap-2 w-full">
                  <div className="bg-[#F5F5F7] p-3 rounded-xl text-center">
                    <p className="text-[10px] text-[#86868B] mb-1">กิจกรรม</p>
                    <p className="text-sm font-bold">{user.BoonScore}</p>
                  </div>
                  <div className="bg-[#F5F5F7] p-3 rounded-xl text-center">
                    <p className="text-[10px] text-[#86868B] mb-1">บันทึกความดี</p>
                    <p className="text-sm font-bold">{completedCount * 10}</p>
                  </div>
                </div>
              </div>

              <div className="bg-[#1D1D1F] text-white rounded-2xl p-6 shadow-xl flex flex-col items-center text-center">
                <h3 className="text-sm font-semibold mb-1 self-start text-white">บัตร QR ประจำตัว</h3>
                <p className="text-[11px] text-[#86868B] mb-4 text-left self-start">ยื่นหน้าจอนี้ให้เจ้าหน้าที่สแกนรับแต้มบุญทันที</p>
                <div className="bg-white p-3 rounded-xl inline-block shadow-lg">
                  <img src={`https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${user.UserID}`} alt="QR" className="w-28 h-28" />
                </div>
                <span className="text-[9px] text-[#86868B] font-mono mt-3">{user.UserID}</span>
              </div>
            </aside>

            {/* Middle panel - Daily log of goodness */}
            <section className="col-span-6 flex flex-col gap-6">
              <div className="bg-white rounded-2xl p-6 border border-[#D2D2D7] shadow-sm flex flex-col">
                <div className="flex justify-between items-center mb-6">
                  <div>
                    <h2 className="text-lg font-bold">บันทึกความดีสากลประจำวัน</h2>
                    <p className="text-xs text-[#86868B]">ทำเครื่องหมายถูกในความดีที่ท่านได้ปฏิบัติในวันนี้</p>
                  </div>
                  <span className="text-xs bg-[#E5E5E7] px-3 py-1 rounded-full font-medium">วันนี้</span>
                </div>

                <div className="flex flex-col gap-3">
                  {Object.keys(goodnessForm).map((key, index) => {
                    const titles = {
                      Giving: "1. การทำทาน / เอื้อเฟื้อเผื่อแผ่แบ่งปัน",
                      Sila: "2. การรักษาศีล 5 / ฝึกจิตสำนึกเว้นบาป",
                      Clean: "3. ความสะอาดของร่างกายและเสนาสนะ",
                      Array: "4. การจัดระเบียบที่อยู่อาศัยข้าวของ",
                      Polite: "5. การรักษาวาจาสุภาพ ปิยวาจาไพเราะ",
                      Ontime: "6. การตรงต่อเวลาและระเบียบวินัยกลุ่ม",
                      Meditate: "7. การนั่งสมาธิปฏิบัติธรรม สวดมนต์เย็น"
                    };
                    const item = goodnessForm[key];
                    return (
                      <div key={key} className={`flex items-center p-3 rounded-xl border transition-all ${item.done ? 'bg-[#F5F5F7] border-[#D2D2D7]' : 'bg-white border-[#E5E5E7] hover:border-[#D2D2D7]'}`}>
                        <button 
                          onClick={() => setGoodnessForm(prev => ({ ...prev, [key]: { ...prev[key], done: !prev[key].done } }))}
                          className={`w-8 h-8 rounded-full border flex items-center justify-center mr-4 transition-all shrink-0 ${item.done ? 'bg-[#34C759] border-[#34C759] text-white' : 'border-[#D2D2D7] hover:bg-[#F5F5F7]'}`}
                        >
                          {item.done ? <i data-lucide="check" className="w-4 h-4"></i> : <span className="text-xs font-semibold text-[#86868B]">{index+1}</span>}
                        </button>
                        <div className="flex-1">
                          <p className="text-xs font-bold">{titles[key]}</p>
                          <p className="text-[10px] text-[#86868B]">สะสม +10 แต้มบุญ</p>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="mt-6 pt-4 border-t border-[#D2D2D7] flex items-center justify-between">
                  <div className="text-xs text-[#86868B]">
                    สำเร็จ <strong className="text-[#34C759]">{completedCount} / 7</strong> รายการความดีสากล
                  </div>
                  <button 
                    onClick={handleSaveGoodness}
                    disabled={syncing}
                    className="bg-[#0071E3] text-white text-[11px] font-bold px-5 py-2.5 rounded-full hover:bg-[#0077ED] flex items-center gap-1.5 shadow-sm active:scale-95 transition-all disabled:opacity-50"
                  >
                    {syncing ? "กำลังส่งบันทึก..." : "ส่งข้อมูลบันทึกความดี"}
                    <i data-lucide="send" className="w-3.5 h-3.5"></i>
                  </button>
                </div>

                {message && (
                  <div className="mt-4 p-3 bg-[#E5F9EB] border border-[#BCECC7] text-[#1E7E34] text-xs rounded-xl flex items-center gap-2">
                    <i data-lucide="check-circle" className="w-4 h-4"></i>
                    {message}
                  </div>
                )}
              </div>
            </section>

            {/* Right Panel - Recommended Activities */}
            <aside className="col-span-3 flex flex-col gap-6">
              <div className="bg-white rounded-2xl border border-[#D2D2D7] shadow-sm overflow-hidden flex flex-col">
                <div className="p-4 border-b border-[#D2D2D7]">
                  <h2 className="text-[12px] font-bold uppercase tracking-wider text-[#86868B]">กิจกรรมสะสมแต้มแนะนา</h2>
                </div>
                <div className="p-4 flex flex-col gap-4">
                  {activities.map(act => (
                    <div key={act.AcID} className="border-b border-[#F5F5F7] pb-4 last:border-0 last:pb-0">
                      <img src={act.Image} alt="Activity" className="w-full h-24 object-cover rounded-xl mb-3 shadow-inner" />
                      <span className="text-[9px] font-bold text-[#AF52DE] uppercase">กองกิจกรรมธรรมะ</span>
                      <h4 className="text-xs font-bold mt-0.5">{act.Title}</h4>
                      <p className="text-[10px] text-[#86868B] leading-tight mt-1">{act.Location} | {act.Time}</p>
                      <button className="mt-3 w-full bg-[#F5F5F7] text-[#0071E3] font-bold text-[10px] py-2 rounded-lg hover:bg-[#E5E5E7] transition-colors">
                        รับ {act.BoonScore} แต้มบุญ
                      </button>
                    </div>
                  ))}
                </div>
              </div>
            </aside>
          </main>

          {/* Footer Status */}
          <footer className="h-10 bg-white border-t border-[#D2D2D7] px-6 flex items-center justify-between text-[10px] text-[#86868B] shrink-0">
            <div className="flex items-center gap-4">
              <span className="flex items-center gap-1.5">
                <div className="w-1.5 h-1.5 rounded-full bg-[#34C759]"></div>
                เชื่อมโยงผ่าน Google Sheets แล้ว
              </span>
            </div>
            <div>Volunteer OS &copy; 2026 &bull; พัฒนาเพื่อคลาวด์ Vercel</div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
