<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Volunteer OS</title>
  
  <style>
    :root {
      --bg-color: #f5f5f7;
      --text-main: #1d1d1f;
      --text-secondary: #86868b;
      --primary-color: #0071e3;
      --danger-color: #ff3b30;
      --header-bg: rgba(255, 255, 255, 0.8);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 0;
    }
    header {
      background: var(--header-bg);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 1px solid #d2d2d7;
    }
    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1000px;
      margin: 0 auto;
      padding: 15px 20px;
    }
    .logo {
      display: flex;
      align-items: center;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
    }
    .logo img {
      width: 24px;
      margin-right: 8px;
    }
    nav ul {
      list-style: none;
      display: flex;
      gap: 20px;
      margin: 0;
      padding: 0;
    }
    nav a {
      cursor: pointer;
      font-size: 14px;
    }
    nav a.active { color: var(--primary-color); }
    .hidden { display: none !important; }
    main {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
    }
    .grid-item {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .btn {
      background: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 8px;
      cursor: pointer;
    }
    .auth-container {
      max-width: 400px;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
    }
    .form-group {
      margin-bottom: 15px;
    }
    .form-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
    }
    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      box-sizing: border-box;
    }
    #loading-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(255,255,255,0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
  </style>
</head>
<body>

  <div id="loading-overlay" class="hidden">
    <h2>กำลังโหลดข้อมูล...</h2>
  </div>

  <header>
    <div class="nav-container">
      <a class="logo" onclick="navigateTo('home')">
        <img src="https://img.icons8.com/ios-filled/50/000000/globe.png" alt="Volunteer OS" />
        Volunteer OS
      </a>
      <nav>
        <ul>
          <li><a onclick="navigateTo('home')" id="nav-home" class="active">หน้าแรก</a></li>
          <li><a onclick="navigateTo('login')" id="nav-login">ลงชื่อเข้าใช้</a></li>
          <li id="nav-logout-container" class="hidden"><a onclick="logout()" class="text-danger">ออกจากระบบ</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section id="home-section">
      <h2>ระบบอาสาสมัคร Volunteer OS</h2>
      <div id="home-grid" class="grid-container">
        </div>
    </section>

    <section id="login-section" class="hidden auth-container">
      <div style="text-align:center; margin-bottom: 20px;">
        <h2>ลงชื่อเข้าสู่ระบบ</h2>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>อีเมลผู้ใช้งาน (UserID) *</label>
          <input type="email" id="login-email" required placeholder="name@volunteer.com" />
        </div>
        <div class="form-group">
          <label>รหัสผ่าน *</label>
          <input type="password" id="login-password" required placeholder="รหัสผ่าน" />
        </div>
        <button type="submit" class="btn" style="width:100%;">ลงชื่อเข้าใช้</button>
      </form>
    </section>

    <section id="dashboard-section" class="hidden">
      <h2>พื้นที่สำหรับสมาชิก</h2>
      <div id="dashboard-content" class="grid-container">
        </div>
    </section>
  </main>

  <script>
    // -------------------------------------------------------------
    // นำ URL Web App ของ GAS ที่ Deploy ใหม่มาใส่ที่นี่
    // -------------------------------------------------------------
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbw1Xyxy1WokcRfy8plDvKlnJ7nhlk_lOChnZQeg2xSq5u07XMRwamMhSdlCaFbuVRI/exec';

    // ฟังก์ชันศูนย์กลางสำหรับเรียกใช้ API
    async function callAPI(action, params = {}) {
      showLoading(true);
      try {
        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          // ใช้ text/plain เพื่อป้องกันปัญหา CORS Preflight OPTIONS บนเบราว์เซอร์
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: action, params: params }),
          redirect: 'follow'
        });
        
        const result = await response.json();
        if (result.status === 'error') {
          throw new Error(result.message);
        }
        return result.data;
      } catch (error) {
        alert('เกิดข้อผิดพลาด: ' + error.message);
        console.error(error);
        return null;
      } finally {
        showLoading(false);
      }
    }

    // ฟังก์ชันแสดง/ซ่อน UI
    function navigateTo(page) {
      document.getElementById('home-section').classList.add('hidden');
      document.getElementById('login-section').classList.add('hidden');
      document.getElementById('dashboard-section').classList.add('hidden');
      
      document.getElementById('nav-home').classList.remove('active');
      document.getElementById('nav-login').classList.remove('active');

      if (page === 'home') {
        document.getElementById('home-section').classList.remove('hidden');
        document.getElementById('nav-home').classList.add('active');
        loadHomeItems();
      } else if (page === 'login') {
        document.getElementById('login-section').classList.remove('hidden');
        document.getElementById('nav-login').classList.add('active');
      } else if (page === 'dashboard') {
        document.getElementById('dashboard-section').classList.remove('hidden');
        loadDashboard();
      }
    }

    function showLoading(show) {
      document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    // การทำงานของฟอร์ม Login
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      
      const userData = await callAPI('login', { userId: email, password: password });
      
      if (userData) {
        // เก็บเซสชันจำลองใน LocalStorage
        localStorage.setItem('user', JSON.stringify(userData));
        updateNavState();
        navigateTo('dashboard');
      }
    });

    function logout() {
      localStorage.removeItem('user');
      updateNavState();
      navigateTo('home');
    }

    function updateNavState() {
      const user = localStorage.getItem('user');
      if (user) {
        document.getElementById('nav-login').classList.add('hidden');
        document.getElementById('nav-logout-container').classList.remove('hidden');
      } else {
        document.getElementById('nav-login').classList.remove('hidden');
        document.getElementById('nav-logout-container').classList.add('hidden');
      }
    }

    // ตัวอย่างการดึงข้อมูลจาก API มาแสดงผล
    async function loadHomeItems() {
      const items = await callAPI('getItems', { page: 'Home' });
      const container = document.getElementById('home-grid');
      container.innerHTML = '';
      
      if (items && items.length > 0) {
        items.forEach(item => {
          const div = document.createElement('div');
          div.className = 'grid-item';
          div.innerHTML = `<h3>${item.Title}</h3><p>${item.Subtitle}</p>`;
          container.appendChild(div);
        });
      } else {
        container.innerHTML = '<p>ไม่มีข้อมูลแสดงผล</p>';
      }
    }

    async function loadDashboard() {
      const userStr = localStorage.getItem('user');
      if (!userStr) return navigateTo('login');
      
      const user = JSON.parse(userStr);
      const dashboard = document.getElementById('dashboard-content');
      dashboard.innerHTML = `<div class="grid-item"><h3>ยินดีต้อนรับคุณ ${user.Name}</h3><p>บทบาท: ${user.Role}</p></div>`;
      
      // ตัวอย่างเรียก API ดึงสถิติ
      const stats = await callAPI('getDashboardStats', { role: user.Role, userId: user.UserID, department: user.Department });
      if (stats && stats.user) {
         dashboard.innerHTML += `<div class="grid-item"><h3>แต้มบุญสะสม</h3><h2>${stats.user.totalBoonPoints} แต้ม</h2></div>`;
      }
    }

    // เริ่มการทำงาน
    updateNavState();
    if (localStorage.getItem('user')) {
      navigateTo('dashboard');
    } else {
      navigateTo('home');
    }
  </script>
</body>
</html>
